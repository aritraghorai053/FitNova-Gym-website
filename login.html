<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitNova Login</title>

    <link rel="stylesheet" href="CSS/login.css">
</head>

<body>

    <section class="login-section">


        <div class="left-side">

            <div class="overlay"></div>

            <div class="logo-box">

                <img src="Thumbnails/logo.png" alt="logo">

                <h1>FITNOVA</h1>

            </div>

        </div>


        <div class="right-side">

            <div class="login-container">

                <h1>
                    WELCOME BACK
                </h1>

                <h2>
                    GYM MEMBER!
                </h2>

                <p>
                    Log in to your account to access your
                    personalized fitness journey.
                </p>

                <form id="loginForm">

                    <div class="input-box">
                        <input type="text" id="username" placeholder="Username" required>
                    </div>

                    <div class="input-box">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>

                    <button type="submit" class="login-btn">
                        LOGIN
                    </button>

                </form>

                <div class="bottom-links">

                    <a href="register.html">
                        Create Account
                    </a>

                    <a href="need_help.html">
                        Need Help?
                    </a>

                </div>

            </div>

        </div>

    </section>

    <script>

        const ADMIN_USERNAME = "Aritra-Ghorai";
        const ADMIN_PASSWORD = "aritra02@";

        document.getElementById("loginForm").addEventListener("submit", function (e) {

            e.preventDefault();

            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value;

            // Admin Login
            if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {

                sessionStorage.setItem("adminAuth", "true");
                sessionStorage.setItem("adminUser", user);

                window.location.href = "admin-portal.html";
                return;
            }

            // Member Login
            alert("Member login will be connected with your database.");

        });

    </script>

</body>

</html>
