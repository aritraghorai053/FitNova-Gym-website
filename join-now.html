<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Now To FitNova</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/join.css">
</head>

<body>

    <nav>
        <div class="left-section">
            <a href="index.html">
                <img class="logo" src="Thumbnails/logo.png" alt="logo">
            </a>
            <div class="tooltip">FitNova</div>
        </div>
        <div class="right-section">
            <ul>
                <li><a href="login.html"><button class="neon-btn">Login</button></a></li>
                <li><a href="register.html"><button class="neon-btn">Register</button></a></li>
            </ul>
        </div>
    </nav>

    <section class="membership-section">
        <div class="membership-container">
            <div class="membership-header">
                <div class="header-left">
                    <h1>MEMBERSHIP</h1>
                    <h2>REGISTATION FORM</h2>

                    <p>FitNova - Transform Beyond Limits</p>

                    <div class="header-right">
                        <img src="Thumbnails/logo.png" alt="">
                        <h3>FitNova</h3>
                    </div>
                </div>

                <form class="membership-form">
                    <h2>Personal Information</h2>

                    <div class="input-group full-width">
                        <label> Full Name</label>
                        <input type="text">
                    </div>
                    <div class="row">
                        <div class="input-group">
                            <label>Date of Birth</label>
                            <input type="date">
                        </div>

                        <div class="input-group">
                            <label>Gender</label>

                            <div class="gender-box">
                                <select id="gender" required>
                                    <option value="" disabled selected>Select Gender</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="text">
                        </div>

                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email">
                        </div>

                    </div>

                    <div class="input-group full-width">
                        <label>Address</label>
                        <textarea rows="4"></textarea>
                    </div>

                    <div class="membership-details">

                        <h2>Membership Details</h2>

                        <div class="plans">

                            <label><input type="checkbox"> 1 Month</label>

                            <label><input type="checkbox"> 3 Months</label>

                            <label><input type="checkbox"> 6 Months</label>

                            <label><input type="checkbox"> 12 Months</label>

                            <label><input type="checkbox"> Personal Training</label>

                            <label><input type="checkbox"> Group Classes</label>

                        </div>

                    </div>


                    <div class="row">

                        <div class="input-group">
                            <label>Start Date</label>
                            <input type="date">
                        </div>

                        <div class="input-group">
                            <label>Payment Method</label>

                            <div class="payment-box">

                                <label>
                                    <input type="radio" name="payment">
                                    Bank Transfer
                                </label>

                                <label>
                                    <input type="radio" name="payment">
                                    Credit Card
                                </label>

                            </div>

                        </div>

                    </div>
                   <div>
    <a href="after-submit.html">

        <button type="button" class="submit-btn">
            Submit
        </button>

    </a>
</div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
