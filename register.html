<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitNova Register</title>

    <link rel="stylesheet" href="CSS/register.css">
</head>

<body>

    <section class="register-section">


        <div class="left-side">

            <img src="Thumbnails/login.png" alt="gym image">

            <div class="overlay"></div>

            <div class="logo-box">

                <img src="Thumbnails/logo.png" alt="logo">

                <h1>FITNOVA</h1>

            </div>

        </div>


        <div class="right-side">

            <div class="register-container">

                <h1>
                    CREATE YOUR
                </h1>

                <h2>
                    ACCOUNT
                </h2>

                <p>
                    Join FitNova and start your
                    transformation journey today.
                </p>

                <form>

                    <div class="input-box">

                        <input type="text"
                        placeholder="Full Name">

                    </div>


                    <div class="input-box">

                        <input type="email"
                        placeholder="Email Address">

                    </div>


                    <div class="input-box">

                        <input type="text"
                        placeholder="Phone Number">

                    </div>


                    <div class="input-box">

                        <input type="password"
                        placeholder="Password">

                    </div>


                    <div class="input-box">

                        <input type="password"
                        placeholder="Confirm Password">

                    </div>


                    <button class="register-btn">
                        CREATE ACCOUNT
                    </button>

                </form>

                <div class="bottom-links">

                    <a href="login.html">
                        Already Have Account?
                    </a>

                    <a href="need_help.html">
                        Need Help?
                    </a>

                </div>

            </div>

        </div>

    </section>

</body>

</html>
